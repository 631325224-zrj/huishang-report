<style>

.wrap { max-width: 1600px; margin: 0 auto; padding: 14px 16px 40px; }

select, input[type="date"] { border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: inherit; outline: none; background: #fff; cursor: pointer; transition: border-color 0.2s; }

.table-header { padding: 14px 20px; font-size: 14px; font-weight: 700; color: #333; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 8px; }

.loading-status { font-size: 13px; color: #888; margin-bottom: 24px; }

<script>
'use strict';

// ════════ 配置 ════════
const API_CONFIG = {
  baseUrl:   'https://cysms.wuuxiang.com/api',
  appId:      '2f30be60293b4f8e8d82dbc272418ba9',
  accessId:   '1d2297864eda4f6db7a00b04260c18db',
  centerId:   247412,  // 总部 ID
  onlineYear:  2025,
  onlineMonth: 6,
};

// 各门店配置 - 使用 centerId 作为 shopId 查询
// 流水号 YY000101 中的 000101 是门店编号，不是收银系统的 shopId
// 实际查询时需用 centerId 作为 shopId 参数
const ALL_SHOPS = [
  { name:'徽商故里朝阳门店', region:'北京', centerId:247413 },
  { name:'徽商故里三里河店', region:'北京', centerId:247414 },

  { name:'徽商故里大蜀山店', region:'合肥', centerId:247421 },
  { name:'徽商故里贡街店',   region:'合肥', centerId:247422 },
  { name:'徽商故里小馆店',   region:'合肥', centerId:247423 },
  { name:'徽商故里水西门店', region:'合肥', centerId:247424 },
  { name:'徽商故里芜湖店',   region:'合肥', centerId:247425 },
  { name:'徽商故里骆岗店',   region:'合肥', centerId:247426 },
  { name:'徽商故里云城里店', region:'合肥', centerId:247427 },
  { name:'徽商故里繁昌店',   region:'合肥', centerId:247428 },
  { name:'徽商故里虹桥店',   region:'浙沪', centerId:247429 },
  { name:'徽商故里陆家嘴店', region:'浙沪', centerId:247430 },
  { name:'徽商故里宁波店',   region:'浙沪', centerId:247431 },
  { name:'徽商故里杭州店',   region:'浙沪', centerId:247432 },

  { name:'徽商故里滁州店',   region:'皖北', centerId:247435 },
  { name:'徽商故里阜阳店',   region:'皖北', centerId:247436 },
  { name:'徽商故里六安店',   region:'皖北', centerId:247437 },
  { name:'徽商故里淮南店',   region:'皖北', centerId:247438 },
  { name:'徽商故里仙人洞店', region:'黄山', centerId:247439 },
  { name:'徽商故里深圳店',   region:'华南', centerId:247440 },
];

const REGION_ORDER = ['北京','华北','合肥','皖北','浙沪','黄山','华南'];
const MONTH_NAMES  = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// ════════ 全局状态 ════════
let DATA = null;
let STATE = {
  dim:'day', compare:'yoy',
  yearA:null, monthA:null, yearB:null, monthB:null,
  dateA:null, dateB:null,
  yearOnly:null, yearPrev:null,
  region:'', shop:'',
};
let chartBar=null, chartLine=null;
let chartsCollapsed = false;
let token = null;

// 排序状态
let SORT = { field: null, asc: true };

// 缓存
const SHOP_DATA_CACHE = {};

// ════════ API 层 ════════
const p = n => String(n).padStart(2,'0');

async function getToken(retryCount = 0) {
  try {
    const url = `${API_CONFIG.baseUrl}/auth/accesstoken?appid=${API_CONFIG.appId}&accessid=${API_CONFIG.accessId}&response_type=token`;
    const res = await fetch(url, {method:'POST'});
    const json = await res.json();
    if (json.access_token) {
      return json.access_token;
    }
    // token 为空，重试
    if (retryCount < 2) {
      await new Promise(r => setTimeout(r, 1000));
      return getToken(retryCount + 1);
    }
    return null;
  } catch (err) {
    console.error('获取Token失败:', err);
    if (retryCount < 2) {
      await new Promise(r => setTimeout(r, 2000));
      return getToken(retryCount + 1);
    }
    return null;
  }
}

// 查询单个日期的数据
// 注意：收银系统 API 中 shopId 参数实际应传入门店的 centerId
async function queryRevenue(settleDate, dateType, centerId, shopId) {
  // 使用 shopId（或 centerId）作为查询参数
  const queryId = shopId || centerId;
  const cacheKey = `${centerId}_${queryId}_${settleDate}_${dateType}`;
  if (SHOP_DATA_CACHE[cacheKey] !== undefined) {
    return SHOP_DATA_CACHE[cacheKey];
  }
  
  const qs = `centerId=${centerId}&shopId=${queryId}&settleDate=${settleDate}&dateType=${dateType}`;
  
  // 带重试的 fetch（超时 10 秒，最多重试 1 次）
  let json, lastError;
  for (let retry = 0; retry < 2; retry++) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);
    try {
      const res = await fetch(`${API_CONFIG.baseUrl}/datatransfer/getBusinessSituation?${qs}`, {
        method:'POST',
        headers:{'Content-Type':'application/json','access_token':token,'accessid':API_CONFIG.accessId,'granttype':'client'},
        signal: controller.signal,
      });
      clearTimeout(timeoutId);
      json = await res.json();
      break; // 成功则退出重试循环
    } catch (e) {
      clearTimeout(timeoutId);
      lastError = e;
      if (e.name !== 'AbortError') throw e; // 非超时错误直接抛出
      console.warn(`[API超时，重试] ${settleDate} ${queryId} (第${retry + 1}次)`);
    }
  }
  if (!json) throw lastError; // 重试都失败则抛出错误
  
  // 提取纯收金额数据
  // 公式：纯收金额 = income.incomeTotal
  // 非收入金额 = notIncome.notIncomeTotal
  // 实收 = businessData.last
  let income = 0;
  const incomeObj = json?.data?.List?.income;
  const notIncomeObj = json?.data?.List?.notIncome;
  const bd = json?.data?.List?.businessData ?? {};
  
  if (incomeObj?.incomeTotal !== undefined) {
    income = parseFloat(incomeObj.incomeTotal) || 0;
  } else if (bd.last !== undefined) {
    // 备用：使用实收（当非收入金额为0时，实收=纯收）
    income = parseFloat(bd.last) || 0;
  }

  // 调试：显示API返回的关键数据
  const debugPanel = document.getElementById('debug-panel');
  const debugData = document.getElementById('debug-data');
  if (debugPanel && debugData) {
    debugPanel.style.display = 'block';
    debugData.innerHTML = `
      <b>类型：</b>${dateType} | <b>日期：</b>${settleDate}<br/>
      <b style="color:#0f0">income.incomeTotal（纯收）：</b>${incomeObj?.incomeTotal ?? '无'}<br/>
      <b>notIncome.notIncomeTotal（非收入）：</b>${notIncomeObj?.notIncomeTotal ?? '无'}<br/>
      <b>businessData.last（实收）：</b>${bd.last ?? '无'}<br/>
      <b>businessData.orig（应收）：</b>${bd.orig ?? '无'}<br/>
      <b>businessData.discTotal（优惠）：</b>${bd.discTotal ?? '无'}<br/>
      <b>已提取纯收金额：</b>${income}
    `;
  }
  
  SHOP_DATA_CACHE[cacheKey] = { settleDate, dateType, centerId, shopId: queryId, income, raw: json };
  return SHOP_DATA_CACHE[cacheKey];
}

// 月度纯收汇总 API
// 使用 getBusinessSituation（与日数据相同），逐日查询后汇总
// 纯收字段：income.incomeTotal（与文档口径完全一致）

// 查询指定月份所有门店的纯收汇总
// 返回: { totalIncome, shops: { shopId: { name, income } } }
async function queryMonthBillList(year, month, centerId, shopId) {
  const cacheKey = `bill_${centerId}_${shopId}_${year}_${month}`;
  if (SHOP_DATA_CACHE[cacheKey] !== undefined) {
    return SHOP_DATA_CACHE[cacheKey];
  }
  
  const monthStr = `${year}-${p(month)}`;
  const dateType = 1;  // 营业日维度（与文档统计口径一致）
  
  // 计算该月的天数
  const daysInMonth = new Date(year, month, 0).getDate();
  
  let totalIncome = 0;
  const shops = {};  // { shopId: { name, income } }
  
  // 逐日查询，用 getBusinessSituation API（与日数据相同）
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${p(month)}-${p(day)}`;
    
    try {
      const result = await queryRevenue(dateStr, dateType, centerId, shopId);
      const income = result.income || 0;
      
      totalIncome += income;
      const sid = String(shopId);
      if (!shops[sid]) {
        shops[sid] = { name: result.shopName || `门店${sid}`, income: 0 };
      }
      shops[sid].income += income;
    } catch (e) {
      // 单天查询失败不影响整月，继续
    }
  }
  
  const result = { totalIncome, shops, monthStr };
  SHOP_DATA_CACHE[cacheKey] = result;
  console.log(`[月度汇总] ${monthStr} 门店${shopId}: 总纯收=${totalIncome.toFixed(2)}`);
  return result;
}

// 并发控制
async function batchQuery(tasks, concurrency=10, onProgress) {
  const results = [];
  const total = tasks.length;
  let completed = 0;
  
  for (let i = 0; i < tasks.length; i += concurrency) {
    const batch = tasks.slice(i, i + concurrency);
    const r = await Promise.all(batch.map(t => t()));
    results.push(...r);
    completed += batch.length;
    if (onProgress) onProgress(Math.round((completed / total) * 100));
  }
  return results;
}

function updateProgress(percent, text) {
  const bar = document.getElementById('loading-progress-bar');
  const status = document.getElementById('loading-status');
  const percentEl = document.getElementById('loading-percent');
  if (bar) bar.style.width = percent + '%';
  if (status) status.textContent = text;
  if (percentEl) percentEl.textContent = percent + '%';
}

// 优化的加载策略：分阶段加载
// 查询所有门店数据并汇总（因为总部 centerId=247412 返回0）
// ═══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════
// localStorage 持久化缓存（用于历史月份数据）
// 策略：首次加载时从 localStorage 恢复历史月份，
//       后续 ensureMonthData 加载的新月份自动写入缓存，
//       无需重复请求 API
// ══════════════════════════════════════════════════════════
const LS_MONTHLY = 'hs_monthly_cache';   // { 'YYYY-MM': { total, shops: { cid: amount } } }
const LS_META    = 'hs_monthly_meta';     // { loadedMonths: ['2026-03', ...] }

function lsGet(key, fallback = null) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { console.warn('[缓存] localStorage 写入失败', e); }
}

function lsRestoreMonths() {
  // 从 localStorage 恢复已加载月份列表，并清理非法 key
  // ── 第一步：彻底扫描 LS_MONTHLY，删除所有非法 key（包括 meta 未记录的残留数据）──
  const now = new Date();
  const curYearNum = now.getFullYear();
  const curMonthNum = now.getMonth() + 1;
  const cache = lsGet(LS_MONTHLY, {});
  const cleanCache = {};
  let dirtyFromCache = 0;
  Object.keys(cache).forEach(k => {
    const match = String(k).match(/^(\d{4})-(\d{2})$/);
    if (!match) { dirtyFromCache++; return; }
    const y = parseInt(match[1]), mo = parseInt(match[2]);
    if (mo < 1 || mo > 12) { dirtyFromCache++; return; }
    const beforeOnline = y < API_CONFIG.onlineYear || (y === API_CONFIG.onlineYear && mo < API_CONFIG.onlineMonth);
    if (beforeOnline) { dirtyFromCache++; return; }
    if (y > curYearNum || (y === curYearNum && mo > curMonthNum)) { dirtyFromCache++; return; }
    cleanCache[k] = cache[k];
  });
  if (dirtyFromCache > 0) {
    lsSet(LS_MONTHLY, cleanCache);
    console.warn(`[缓存扫描] 发现并删除 ${dirtyFromCache} 个非法 key（含上线前月份）`);
  }

  // ── 第二步：从 meta 恢复 loadedMonths，只保留合法 key ──
  const meta = lsGet(LS_META, { loadedMonths: [] });
  const validKeys = [];
  let dirtyFromMeta = 0;
  meta.loadedMonths.forEach(m => {
    const match = String(m).match(/^(\d{4})-(\d{2})$/);
    if (!match) { dirtyFromMeta++; return; }
    const y = parseInt(match[1]), mo = parseInt(match[2]);
    if (mo < 1 || mo > 12) { dirtyFromMeta++; return; }
    const beforeOnline = y < API_CONFIG.onlineYear || (y === API_CONFIG.onlineYear && mo < API_CONFIG.onlineMonth);
    if (beforeOnline) { dirtyFromMeta++; return; }
    if (y > curYearNum || (y === curYearNum && mo > curMonthNum)) { dirtyFromMeta++; return; }
    // 确保 cleanCache 里有这个 key 的数据（双重校验）
    if (!cleanCache[m]) { dirtyFromMeta++; return; }
    validKeys.push(m);
    loadedMonths.add(m);
  });
  if (dirtyFromMeta > 0) {
    lsSet(LS_META, { loadedMonths: validKeys });
    console.warn(`[缓存恢复] meta 中发现 ${dirtyFromMeta} 个非法 key 已清除`);
  }
  console.log(`[缓存恢复] ${loadedMonths.size} 个历史月份已从本地缓存加载`);
}

function lsSaveMonth(key, total, shops) {
  // 保存单月数据到 localStorage
  const cache = lsGet(LS_MONTHLY, {});
  cache[key] = { total, shops, ts: Date.now() };
  lsSet(LS_MONTHLY, cache);
}

function lsLoadMonth(key) {
  // 从 localStorage 读取单月数据
  const cache = lsGet(LS_MONTHLY, {});
  return cache[key] || null;
}

function lsSaveMeta() {
  lsSet(LS_META, { loadedMonths: [...loadedMonths] });
}

// ══════════════════════════════════════════════════════════
// 清理旧缓存（2026-04-08：API从getBusinessSituation改为getserialdata，旧缓存数据不兼容）
// ══════════════════════════════════════════════════════════
const LS_CACHE_VERSION = 'v4';  // v3→v4：强制清除旧缓存，确保使用新的getBusinessSituation API重新加载所有月份数据

function lsClearOldCache() {
  // 检查是否需要清理旧缓存
  const cacheVersion = lsGet('hs_cache_version', '');
  if (cacheVersion === LS_CACHE_VERSION) {
    return; // 缓存已是最新版本，无需清理
  }
  
  console.log('[缓存清理] 检测到旧版本缓存，开始清理...');
  
  // 清理月度缓存
  localStorage.removeItem(LS_MONTHLY);
  // 清理元数据
  localStorage.removeItem(LS_META);
  // 清理其他旧缓存
  localStorage.removeItem('hs_shop_data_cache');
  
  // 设置新版本号
  lsSet('hs_cache_version', LS_CACHE_VERSION);
  
  console.log('[缓存清理] 旧缓存已清理，将使用新的账单API重新加载数据');
  loadedMonths.clear();
  
  // 同时清空内存中的账单API缓存和数据，确保使用新的账单API重新获取数据
  Object.keys(SHOP_DATA_CACHE).forEach(k => delete SHOP_DATA_CACHE[k]);
  if (DATA) {
    if (DATA.monthlyData) Object.keys(DATA.monthlyData).forEach(k => delete DATA.monthlyData[k]);
    if (DATA.shopMonthlyData) Object.keys(DATA.shopMonthlyData).forEach(sid => {
      if (DATA.shopMonthlyData[sid]) Object.keys(DATA.shopMonthlyData[sid]).forEach(k => delete DATA.shopMonthlyData[sid][k]);
    });
    if (DATA.yearlyData) Object.keys(DATA.yearlyData).forEach(k => delete DATA.yearlyData[k]);
    if (DATA.shopYearlyData) Object.keys(DATA.shopYearlyData).forEach(sid => {
      if (DATA.shopYearlyData[sid]) Object.keys(DATA.shopYearlyData[sid]).forEach(k => delete DATA.shopYearlyData[sid][k]);
    });
  }
  console.log('[缓存清理] 已清空所有内存缓存（SHOP_DATA_CACHE 和 DATA.*）');
}

async function loadAllData() {
  // 清理旧缓存（API升级后需要）
  lsClearOldCache();
  
  updateProgress(5, '获取访问凭证…');
  token = await getToken();
  if (!token) {
    throw new Error('无法获取 API Token，请检查网络连接后刷新重试');
  }

  const now = new Date();
  const curYear = now.getFullYear();
  const curMonth = now.getMonth() + 1;
  const today = `${curYear}-${p(curMonth)}-${p(now.getDate())}`;
  const curMonthKey = `${curYear}-${p(curMonth)}`;

  // ── 生成近 7 天日期列表（只用于日报图表，减少初始请求）──
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    days.push(`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`);
  }

  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now);
    d.setMonth(d.getMonth() - i);
    const y = d.getFullYear(), m = d.getMonth() + 1;
    if (y < API_CONFIG.onlineYear || (y === API_CONFIG.onlineYear && m < API_CONFIG.onlineMonth)) continue;
    months.push({ key: `${y}-${p(m)}`, settleDate: `${y}-${p(m)}-01` });
  }

  const years = [];
  for (let y = API_CONFIG.onlineYear; y <= curYear; y++) {
    years.push({ key: String(y), settleDate: `${y}-01-01` });
  }

  const shopIds = ALL_SHOPS.map(s => s.centerId);

  // ── 从 localStorage 恢复历史月份缓存（0 API 请求）──
  updateProgress(10, '恢复本地缓存…');
  lsRestoreMonths(); // 填充 loadedMonths

  // 初始化数据结构
  const monthlyData = {};
  const yearlyData  = {};
  const shopMonthlyData = {};
  const shopYearlyData  = {};
  ALL_SHOPS.forEach(s => {
    shopMonthlyData[s.centerId] = {};
    shopYearlyData[s.centerId]  = {};
  });

  // 从 localStorage 加载已缓存的历史月份数据
  let cacheHit = 0;
  loadedMonths.forEach(mKey => {
    const cached = lsLoadMonth(mKey);
    if (cached) {
      monthlyData[mKey] = cached.total || 0;
      Object.entries(cached.shops || {}).forEach(([cid, amt]) => {
        const n = Number(cid);
        if (shopMonthlyData[n]) shopMonthlyData[n][mKey] = amt;
      });
      cacheHit++;
    }
  });

  // 年度汇总（从已缓存月份累加）
  Object.entries(monthlyData).forEach(([mKey, total]) => {
    const yKey = mKey.slice(0, 4);
    yearlyData[yKey] = (yearlyData[yKey] || 0) + total;
    Object.entries(shopMonthlyData).forEach(([cid, months]) => {
      if (months[mKey]) {
        shopYearlyData[Number(cid)][yKey] = (shopYearlyData[Number(cid)][yKey] || 0) + months[mKey];
      }
    });
  });
  console.log(`[缓存恢复] ${cacheHit} 个月份已加载，共 ${Object.keys(monthlyData).length} 个有数据月份`);

  // 初始化日数据
  const dailyData = {};
  days.forEach(d => { dailyData[d] = 0; });
  const shopDailyData = {};
  ALL_SHOPS.forEach(s => { shopDailyData[s.centerId] = {}; days.forEach(d => { shopDailyData[s.centerId][d] = 0; }); });

  // ══════════════════════════════════════════════════════════
  // 第一阶段：加载近 7 天日维度数据（7 × 28 = 196 次 API）
  // ══════════════════════════════════════════════════════════
  updateProgress(15, `加载近7天日数据…`);
  const dayTasks = [];
  days.forEach(d => {
    shopIds.forEach(shopId => {
      dayTasks.push(() => queryRevenue(d, 'day', API_CONFIG.centerId, shopId));
    });
  });
  const dayResults = await batchQuery(dayTasks, 20, prog => updateProgress(15 + prog * 0.5, `日数据 ${prog}%…`));
  const validDay = dayResults.filter(r => r?.income !== undefined);
  console.log(`[日数据] 有效:${validDay.length}/${dayResults.length}`);

  dayResults.forEach(r => {
    if (r?.income !== undefined && r?.shopId) {
      dailyData[r.settleDate] = (dailyData[r.settleDate] || 0) + r.income;
      if (shopDailyData[r.shopId]) shopDailyData[r.shopId][r.settleDate] = r.income;
    }
  });

  // ══════════════════════════════════════════════════════════
  // 第二阶段：加载当前月账单明细数据（28 次 API，分页获取）
  // 使用账单明细 API（getserialdata）获取整月数据
  // ══════════════════════════════════════════════════════════
  updateProgress(68, `加载当月账单明细…`);
  const monthTasks = shopIds.map(shopId => () => queryMonthBillList(curYear, curMonth, API_CONFIG.centerId, shopId));
  const monthResults = await batchQuery(monthTasks, 5, prog => updateProgress(68 + prog * 0.3, `当月账单 ${prog}%…`));
  
  // 清零并重新填入当前月（避免日维度累加误差）
  const oldCurMonth = monthlyData[curMonthKey] || 0;
  monthlyData[curMonthKey] = 0;
  yearlyData[String(curYear)] = Math.max(0, (yearlyData[String(curYear)] || 0) - oldCurMonth);
  shopIds.forEach(sid => {
    if (shopMonthlyData[sid]?.[curMonthKey]) {
      const old = shopMonthlyData[sid][curMonthKey];
      shopMonthlyData[sid][curMonthKey] = 0;
      shopYearlyData[sid][String(curYear)] = Math.max(0, (shopYearlyData[sid][String(curYear)] || 0) - old);
    }
  });

  const shopMonthTmp = {};
  monthResults.forEach(result => {
    if (result?.shops) {
      Object.entries(result.shops).forEach(([sid, shopData]) => {
        const n = Number(sid);
        if (shopData.income > 0) {
          monthlyData[curMonthKey] = (monthlyData[curMonthKey] || 0) + shopData.income;
          yearlyData[String(curYear)] = (yearlyData[String(curYear)] || 0) + shopData.income;
          if (!shopMonthlyData[n]) shopMonthlyData[n] = {};
          if (!shopYearlyData[n]) shopYearlyData[n] = {};
          shopMonthlyData[n][curMonthKey] = (shopMonthlyData[n][curMonthKey] || 0) + shopData.income;
          shopYearlyData[n][String(curYear)] = (shopYearlyData[n][String(curYear)] || 0) + shopData.income;
          shopMonthTmp[n] = (shopMonthTmp[n] || 0) + shopData.income;
        }
      });
    }
  });

  console.log(`[当前月账单API] ${curMonthKey}: 总纯收=${monthlyData[curMonthKey].toFixed(2)}, 参与门店=${Object.keys(shopMonthTmp).length}`);

  // 将当前月数据写入 localStorage（下次访问直接用缓存）
  lsSaveMonth(curMonthKey, monthlyData[curMonthKey], shopMonthTmp);
  loadedMonths.add(curMonthKey);
  lsSaveMeta();

  console.log(`[加载完成] 当前月 ${curMonthKey}:`, monthlyData[curMonthKey]);
  console.log('[月数据]', monthlyData);
  console.log('[门店月数据] 大蜀山:', shopMonthlyData[247421]);

  // ══════════════════════════════════════════════════════════
  // 第三阶段：静默预加载近 6 个月（保证常见环比对比秒开，无需等待）
  // ══════════════════════════════════════════════════════════
  const preloadTargets = [];
  for (let i = 1; i <= 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const py = d.getFullYear(), pm = d.getMonth() + 1;
    const pk = `${py}-${p(pm)}`;
    const isOnline = py > API_CONFIG.onlineYear || (py === API_CONFIG.onlineYear && pm >= API_CONFIG.onlineMonth);
    if (isOnline && !loadedMonths.has(pk)) preloadTargets.push([py, pm, pk]);
  }

  // 批量并发预加载（所有月份并行，加速初始化）
  const preloadPromises = preloadTargets.map(async ([py, pm, pk]) => {
    try {
      const tasks = shopIds.map(sid => () => queryMonthBillList(py, pm, API_CONFIG.centerId, sid));
      const results = await batchQuery(tasks, 8);  // 并发提高到8，加快预加载
      const prevYKey = String(py);
      const shopTmp = {};
      results.forEach(result => {
        if (result?.shops) {
          Object.entries(result.shops).forEach(([sid, shopData]) => {
            const n = Number(sid);
            if (shopData.income > 0) {
              monthlyData[pk] = (monthlyData[pk] || 0) + shopData.income;
              yearlyData[prevYKey] = (yearlyData[prevYKey] || 0) + shopData.income;
              if (!shopMonthlyData[n]) shopMonthlyData[n] = {};
              if (!shopYearlyData[n]) shopYearlyData[n] = {};
              shopMonthlyData[n][pk] = (shopMonthlyData[n][pk] || 0) + shopData.income;
              shopYearlyData[n][prevYKey] = (shopYearlyData[n][prevYKey] || 0) + shopData.income;
              shopTmp[n] = (shopTmp[n] || 0) + shopData.income;
            }
          });
        }
      });
      if (Object.keys(shopTmp).length > 0) {
        lsSaveMonth(pk, monthlyData[pk], shopTmp);
        loadedMonths.add(pk);
        lsSaveMeta();
      }
      console.log(`[预加载 ${pk}] 完成: ${Object.keys(shopTmp).length} 门店`);
    } catch (e) {
      console.warn(`[预加载失败] ${pk}`, e.message);
    }
  });

  // 后台静默等待预加载完成（不阻塞UI，页面初始化后可立即交互）
  Promise.all(preloadPromises).then(() => {
    lsSaveMeta();
    console.log('[预加载] 全部完成');
  });

  updateProgress(100, '完成');
  return {
    success: true,
    generatedAt: now.toISOString(),
    today,
    curYear,
    curMonth,
    dailyData,
    monthlyData,
    yearlyData,
    availableYears: years.map(y => parseInt(y.key)).sort((a, b) => a - b),
    availableMonths: months.map(m => m.key),
    dailyDates: days,
    allShops: ALL_SHOPS,
    shopDailyData,
    shopMonthlyData,
    shopYearlyData,
    summary: {
      today: dailyData[today] || 0,
      currentMonth: monthlyData[curMonthKey] || 0,
      currentYear: yearlyData[String(curYear)] || 0,
    },
  };
}

// ════════ 工具函数 ════════
// 金额格式化：元为单位，保留两位小数
const fmt = v => (!v && v !== 0) ? '—' : v.toFixed(2);
const clsUp = v => v === null ? '' : (v >= 0 ? 'c-up' : 'c-down');
const sign  = v => v === null ? '' : (v >= 0 ? '▲' : '▼');
const calcChange = (a, b) => {
  if (a === 0 && b === 0) return { diff: 0, pct: 0 };
  if (a === 0 && b > 0) return { diff: -b, pct: -100 };
  if (b === 0 && a > 0) return { diff: a, pct: null };
  if (a === null || a === undefined || b === null || b === undefined) return { diff: null, pct: null };
  return { diff: a - b, pct: (a - b) / b * 100 };
};
const prevYearDate = d => { const x = new Date(d); x.setFullYear(x.getFullYear() - 1); return x.toISOString().slice(0, 10); };

// ════════ 按需加载历史月份数据 ════════
let loadingMonths = new Set();   // 正在加载中
let loadedMonths  = new Set();   // 已完整加载完毕（用于判断是否需要重新加载）

async function ensureMonthData(year, month) {
  const key = `${year}-${p(month)}`;
  // ── 校验年份有效性：只加载系统上线月份之后到当前月的数据 ──
  const nowY = new Date().getFullYear();
  const nowM = new Date().getMonth() + 1;
  const beforeOnline = year < API_CONFIG.onlineYear || (year === API_CONFIG.onlineYear && month < API_CONFIG.onlineMonth);
  const isFuture = year > nowY || (year === nowY && month > nowM);
  if (beforeOnline || isFuture) {
    console.warn(`[跳过加载] ${key} 早于上线日期或超出当前月（online=${API_CONFIG.onlineYear}-${p(API_CONFIG.onlineMonth)}, cur=${nowY}-${p(nowM)}）`);
    return;
  }
  // 已完整加载过，直接跳过
  if (loadedMonths.has(key)) {
    return;
  }
  // 正在加载中，跳过（避免并发重复加载）
  if (loadingMonths.has(key)) {
    return;
  }
  loadingMonths.add(key);
  const monthName = `${year}年${MONTH_NAMES[month - 1]}`;
  const loadingEl = document.getElementById('month-loading');
  if (loadingEl) {
    loadingEl.style.display = '';
    loadingEl.textContent = `↻ 加载 ${monthName}…`;
  }
  console.log(`[加载历史月份] ${key}...`);
  try {
    const shopIds = ALL_SHOPS.map(s => s.centerId);
    const settleDate = `${year}-${p(month)}-01`;

    // ── 先清零该月所有数据，防止重复累加 ──
    const yKey = key.slice(0, 4);
    const oldMonthTotal = DATA.monthlyData[key] || 0;
    DATA.monthlyData[key] = 0;
    if (DATA.yearlyData[yKey] !== undefined) {
      DATA.yearlyData[yKey] = Math.max(0, DATA.yearlyData[yKey] - oldMonthTotal);
    }
    shopIds.forEach(sid => {
      const shopMonth = DATA.shopMonthlyData[sid];
      if (shopMonth && shopMonth[key]) {
        const oldShop = shopMonth[key];
        shopMonth[key] = 0;
        if (DATA.shopYearlyData[sid]?.[yKey] !== undefined) {
          DATA.shopYearlyData[sid][yKey] = Math.max(0, DATA.shopYearlyData[sid][yKey] - oldShop);
        }
      }
    });

    // ── 使用账单明细 API（getserialdata）获取整月数据 ──
    // 每个门店单独查询并聚合（28次请求，每次分页获取全部账单）
    const tasks = shopIds.map(shopId => () => queryMonthBillList(year, month, API_CONFIG.centerId, shopId));
    console.log(`[${key}] 发起账单明细请求: ${tasks.length} 个门店`);
    const results = await batchQuery(tasks, 5);  // 降低并发，避免API限流

    const shopMonthTmp = {};
    results.forEach(result => {
      if (result?.shops) {
        Object.entries(result.shops).forEach(([sid, shopData]) => {
          const n = Number(sid);
          if (shopData.income > 0) {
            DATA.monthlyData[key] = (DATA.monthlyData[key] || 0) + shopData.income;
            DATA.yearlyData[yKey] = (DATA.yearlyData[yKey] || 0) + shopData.income;
            if (!DATA.shopMonthlyData[n]) DATA.shopMonthlyData[n] = {};
            if (!DATA.shopYearlyData[n]) DATA.shopYearlyData[n] = {};
            DATA.shopMonthlyData[n][key] = (DATA.shopMonthlyData[n][key] || 0) + shopData.income;
            DATA.shopYearlyData[n][yKey] = (DATA.shopYearlyData[n][yKey] || 0) + shopData.income;
            shopMonthTmp[n] = (shopMonthTmp[n] || 0) + shopData.income;
          }
        });
      }
    });

    console.log(`[${key} 账单API聚合] 总纯收: ${DATA.monthlyData[key].toFixed(2)}, 参与门店数: ${Object.keys(shopMonthTmp).length}`);

    // ── 写入 localStorage，下次访问直接用缓存，无需再请求 API ──
    lsSaveMonth(key, DATA.monthlyData[key], shopMonthTmp);
    lsSaveMeta();
    console.log(`[加载完成] ${key}:`, DATA.monthlyData[key], '(已写入本地缓存)');
    loadedMonths.add(key); // ✅ 标记为已完整加载
    render();
  } catch (e) {
    console.error(`[加载失败] ${key}:`, e);
  } finally {
    loadingMonths.delete(key);
    const loadingEl = document.getElementById('month-loading');
    if (loadingEl && loadingMonths.size === 0) {
      loadingEl.style.display = 'none';
      loadingEl.textContent = '';
    }
  }
}

// ════════ 获取汇总数据 ════════
function getSummaryRevenue(isCurrent, shopCenterId) {
  if (STATE.dim === 'day') {
    const date = isCurrent ? STATE.dateA : STATE.dateB;
    if (shopCenterId && DATA?.shopDailyData?.[shopCenterId]) {
      return DATA.shopDailyData[shopCenterId][date] || 0;
    }
    return DATA?.dailyData?.[date] || 0;
  } else if (STATE.dim === 'month') {
    const y = isCurrent ? STATE.yearA : STATE.yearB;
    const m = isCurrent ? STATE.monthA : STATE.monthB;
    const key = `${y}-${p(m)}`;
    if (shopCenterId && DATA?.shopMonthlyData?.[shopCenterId]) {
      return DATA.shopMonthlyData[shopCenterId][key] || 0;
    }
    return DATA?.monthlyData?.[key] || 0;
  } else {
    const y = isCurrent ? STATE.yearOnly : STATE.yearPrev;
    if (shopCenterId && DATA?.shopYearlyData?.[shopCenterId]) {
      return DATA.shopYearlyData[shopCenterId][String(y)] || 0;
    }
    return DATA?.yearlyData?.[String(y)] || 0;
  }
}

// ════════ 初始化选择器 ════════
function initSelectors() {
  const curYear = DATA?.curYear || new Date().getFullYear();
  const curMonth = DATA?.curMonth || (new Date().getMonth() + 1);
  const today = DATA?.today || new Date().toISOString().slice(0, 10);

  const availableYears = DATA?.availableYears || [curYear];
  const availableMonths = DATA?.availableMonths || [];

  // ── 年份下拉：只显示有数据的年份 ──
  const yearOpts = availableYears.slice().reverse().map(y => `<option value="${y}">${y}</option>`).join('');
  ['selYearA', 'selYearB', 'selYearOnly', 'selYearPrev'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = yearOpts; });

  // ── 月份下拉：根据当前选中年份，动态过滤只显示有数据的月份 ──
  function getMonthOpts(year) {
    return MONTH_NAMES.map((m, i) => {
      const key = `${year}-${p(i + 1)}`;
      const disabled = availableMonths.includes(key) ? '' : ' disabled';
      return `<option value="${i + 1}"${disabled}>${m}</option>`;
    }).join('');
  }

  // ── 默认选中最新有数据的年月 ──
  const latestValidYear = availableYears[availableYears.length - 1] || curYear;
  const latestYearMonths = availableMonths.filter(k => k.startsWith(String(latestValidYear) + '-'));
  const latestValidMonth = latestYearMonths.length > 0
    ? parseInt(latestYearMonths[latestYearMonths.length - 1].split('-')[1])
    : curMonth;

  // 年份B默认选前一个有数据的年份（如有2026和2025，默认B=2025）
  const prevValidYear = availableYears[availableYears.length - 2] || (latestValidYear - 1);

  // 辅助：找某年某月往前最近的有数据月份（含边界保护）
  function findPrevAvailableMonth(year, month) {
    const minYear = availableYears.length > 0 ? Math.min(...availableYears) : API_CONFIG.onlineYear;
    let y = year, m = month;
    while (m > 0) {
      if (availableMonths.includes(`${y}-${p(m)}`)) return { year: y, month: m };
      m--;
      if (m === 0) { y--; m = 12; }
      if (y < minYear) return null; // 防止死循环
    }
    return null;
  }

  // 同比默认值：去年同期
  const yoyDefault = findPrevAvailableMonth(latestValidYear - 1, latestValidMonth);
  // 环比默认值：当月上月
  const momDefault = findPrevAvailableMonth(
    latestValidMonth === 1 ? prevValidYear : latestValidYear,
    latestValidMonth === 1 ? 12 : latestValidMonth - 1
  );

  STATE.yearA = latestValidYear;
  STATE.yearB = yoyDefault ? yoyDefault.year : prevValidYear;
  STATE.yearOnly = latestValidYear;
  STATE.yearPrev = prevValidYear;
  STATE.monthA = latestValidMonth;
  STATE.monthB = yoyDefault ? yoyDefault.month : (momDefault ? momDefault.month : latestValidMonth);

  // 渲染月份选项（按各自年份过滤）
  document.getElementById('selMonthA').innerHTML = getMonthOpts(latestValidYear);
  document.getElementById('selMonthB').innerHTML = getMonthOpts(STATE.yearB);

  document.getElementById('selYearA').value = STATE.yearA;
  document.getElementById('selYearB').value = STATE.yearB;
  document.getElementById('selYearOnly').value = STATE.yearOnly;
  document.getElementById('selYearPrev').value = STATE.yearPrev;
  document.getElementById('selMonthA').value = STATE.monthA;
  document.getElementById('selMonthB').value = STATE.monthB;

  const maxDate = DATA?.dailyDates ? DATA.dailyDates[DATA.dailyDates.length - 1] : today;
  document.getElementById('dateA').value = today; document.getElementById('dateA').max = maxDate;
  const prevD = prevYearDate(today);
  document.getElementById('dateB').value = prevD; document.getElementById('dateB').max = maxDate;
  STATE.dateA = today; STATE.dateB = prevD;

  // 区域选项
  const regions = [...new Set(ALL_SHOPS.map(s => s.region))].sort((a, b) => {
    const ai = REGION_ORDER.indexOf(a), bi = REGION_ORDER.indexOf(b);
    return (ai === -1 ? 9 : ai) - (bi === -1 ? 9 : bi);
  });
  const regSel = document.getElementById('selRegion');
  regions.forEach(r => regSel.appendChild(new Option(r + '区域', r)));

  // 门店选项
  const shopSel = document.getElementById('selShop');
  REGION_ORDER.forEach(region => {
    const shops = ALL_SHOPS.filter(s => s.region === region);
    if (shops.length > 0) {
      const group = document.createElement('optgroup');
      group.label = region + '区域';
      shops.forEach(s => group.appendChild(new Option(s.name, s.name)));
      shopSel.appendChild(group);
    }
  });

  if (DATA?.generatedAt) {
    const d = new Date(DATA.generatedAt);
    document.getElementById('topbar-time').textContent = '数据更新 ' + d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  }

  bindEvents();
}

// ════════ 事件绑定 ════════
function bindEvents() {
  document.querySelectorAll('.dim-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dim-btn').forEach(b => b.classList.remove('btn-active'));
      btn.classList.add('btn-active');
      STATE.dim = btn.dataset.dim;
      document.getElementById('ctrl-day').style.display   = STATE.dim === 'day'   ? '' : 'none';
      document.getElementById('ctrl-month').style.display = STATE.dim === 'month' ? '' : 'none';
      document.getElementById('ctrl-year').style.display   = STATE.dim === 'year'  ? '' : 'none';
      updateBSelector();
      render();
    });
  });

  document.getElementById('selCompare').addEventListener('change', e => {
    STATE.compare = e.target.value;
    updateBSelector();
    updateMonthOpts(STATE.yearB, 'selMonthB');
    document.getElementById('selMonthB').value = STATE.monthB;
    ensureMonthData(STATE.yearB, STATE.monthB);
    render();
  });

  // 日维度固定使用同比，selDayCompare 已移除，无需监听

  document.getElementById('selYearA').addEventListener('change', e => {
    STATE.yearA = +e.target.value;
    updateMonthOpts(STATE.yearA, 'selMonthA');
    updateBSelector();
    ensureMonthData(STATE.yearA, STATE.monthA);
    render();
  });
  document.getElementById('selYearB').addEventListener('change', e => {
    STATE.yearB = +e.target.value;
    updateMonthOpts(STATE.yearB, 'selMonthB');
    ensureMonthData(STATE.yearB, STATE.monthB);
    render();
  });
  document.getElementById('selMonthA').addEventListener('change', e => {
    STATE.monthA = +e.target.value;
    updateBSelector();
    ensureMonthData(STATE.yearA, STATE.monthA);
    render();
  });
  document.getElementById('selMonthB').addEventListener('change', e => {
    STATE.monthB = +e.target.value;
    ensureMonthData(STATE.yearB, STATE.monthB);
    render();
  });
  document.getElementById('selYearOnly').addEventListener('change', e => { STATE.yearOnly = +e.target.value; render(); });
  document.getElementById('selYearPrev').addEventListener('change', e => { STATE.yearPrev = +e.target.value; render(); });

  document.getElementById('dateA').addEventListener('change', e => {
    STATE.dateA = e.target.value;
    if (STATE.compare === 'yoy') {
      const prev = prevYearDate(STATE.dateA);
      document.getElementById('dateB').value = prev;
      STATE.dateB = prev;
    }
    render();
  });
  document.getElementById('dateB').addEventListener('change', e => { STATE.dateB = e.target.value; render(); });

  document.getElementById('selRegion').addEventListener('change', e => {
    STATE.region = e.target.value;
    if (STATE.region) { STATE.shop = ''; document.getElementById('selShop').value = ''; }
    render();
  });

  document.getElementById('selShop').addEventListener('change', e => {
    STATE.shop = e.target.value;
    if (STATE.shop) { STATE.region = ''; document.getElementById('selRegion').value = ''; }
    render();
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    STATE.compare = 'yoy';
    STATE.region = ''; STATE.shop = '';
    document.getElementById('selRegion').value = '';
    document.getElementById('selShop').value = '';
    const prev = prevYearDate(STATE.dateA);
    document.getElementById('dateB').value = prev;
    STATE.dateB = prev;
    render();
  });
}

// ════════ 月份选项动态过滤（全局，根据年份只显示有数据的月份）════════
function updateMonthOpts(year, selId) {
  const el = document.getElementById(selId);
  if (!el) return;
  const availableMonths = DATA?.availableMonths || [];
  el.innerHTML = MONTH_NAMES.map((m, i) => {
    const key = `${year}-${p(i + 1)}`;
    const disabled = availableMonths.includes(key) ? '' : ' disabled';
    return `<option value="${i + 1}"${disabled}>${m}</option>`;
  }).join('');
}

function updateBSelector() {
  if (STATE.dim === 'month') {
    const isMom = STATE.compare === 'mom';
    const availableMonths = DATA?.availableMonths || [];
    document.getElementById('selYearB').style.display = isMom ? '' : 'none';
    document.getElementById('lblYearB').style.display = isMom ? '' : 'none';
    document.getElementById('selMonthB').style.display = isMom ? '' : 'none';
    if (isMom) {
      // 环比：上一个月，若当期是1月则年份也往前一年
      let mB = STATE.monthA === 1 ? 12 : STATE.monthA - 1;
      let yB = STATE.monthA === 1 ? STATE.yearA - 1 : STATE.yearA;
      // 若目标月份无数据，尝试再往前找（加下界保护防死循环）
      const minYear = DATA?.availableYears ? Math.min(...DATA.availableYears) : yB - 2;
      let safety = 0;
      while (!availableMonths.includes(`${yB}-${p(mB)}`) && yB >= minYear && safety++ < 24) {
        mB--; if (mB === 0) { yB--; mB = 12; }
      }
      STATE.yearB = yB;
      STATE.monthB = mB;
      document.getElementById('selYearB').value = STATE.yearB;
      updateMonthOpts(STATE.yearB, 'selMonthB');
      document.getElementById('selMonthB').value = STATE.monthB;
    } else {
      STATE.yearB = STATE.yearA - 1;
      STATE.monthB = STATE.monthA;
      document.getElementById('selYearB').value = STATE.yearB;
    }
  }
}

// ════════ 渲染汇总卡片 ════════
let _yearRenderResolve = null; // 年报加载完毕后回调
function renderSummary() {
  // 确定当前查看范围对应的 centerId
  let shopCenterId = null;
  if (STATE.shop) {
    const shop = ALL_SHOPS.find(s => s.name === STATE.shop);
    if (shop) shopCenterId = shop.centerId;
  }

  // 自动加载对比月份数据（如果缺失）
  // 注意：同比（yoy）时 yearB = yearA-1，可能超出系统数据范围，ensureMonthData 内部会校验跳过
  if (STATE.dim === 'month') {
    ensureMonthData(STATE.yearA, STATE.monthA); // 当前月
    if (STATE.compare === 'mom') {
      // 环比：yearB 一定是有效年份（上个月）
      ensureMonthData(STATE.yearB, STATE.monthB);
    }
    // 同比（yoy）：去年数据 API 不可靠，跳过自动加载，显示 — 即可
  } else if (STATE.dim === 'year') {
    // 年报：需要加载选中年份的全部有效月份（不能只加载1月）
    // 收集所有需要加载的月份 Promise，等全部完成后再渲染
    const curYearNow = DATA?.curYear || new Date().getFullYear();
    const curMonthNow = DATA?.curMonth || (new Date().getMonth() + 1);
    const yOnlyMaxMonth = (STATE.yearOnly === curYearNow) ? curMonthNow : 12;
    const yOnlyMinMonth = (STATE.yearOnly === API_CONFIG.onlineYear) ? API_CONFIG.onlineMonth : 1;
    const yPrevMaxMonth = (STATE.yearPrev === curYearNow) ? curMonthNow : 12;
    const yPrevMinMonth = (STATE.yearPrev === API_CONFIG.onlineYear) ? API_CONFIG.onlineMonth : 1;

    const promises = [];
    for (let m = yOnlyMinMonth; m <= yOnlyMaxMonth; m++) {
      promises.push(ensureMonthData(STATE.yearOnly, m));
    }
    for (let m = yPrevMinMonth; m <= yPrevMaxMonth; m++) {
      promises.push(ensureMonthData(STATE.yearPrev, m));
    }

    // 显示加载中状态
    const loadingEl = document.getElementById('month-loading');
    if (loadingEl) {
      loadingEl.style.display = '';
      loadingEl.textContent = `↻ 加载年报数据（${promises.length} 个月）…`;
    }

    // 等所有月份加载完毕后统一渲染
    Promise.all(promises).then(() => {
      if (loadingEl) loadingEl.style.display = 'none';
      renderYearTable();
    });
    return; // 等待异步完成后再渲染，暂不渲染
  }

  const revA = getSummaryRevenue(true, shopCenterId);
  const revB = getSummaryRevenue(false, shopCenterId);
  const ch = calcChange(revA, revB);

  let labelA = '', labelB = '';
  if (STATE.dim === 'month') {
    labelA = `${STATE.yearA}年${MONTH_NAMES[STATE.monthA - 1]}`;
    labelB = STATE.compare === 'yoy' ? `${STATE.yearB}年${MONTH_NAMES[STATE.monthB - 1]}` : `${STATE.yearB}年${MONTH_NAMES[STATE.monthB - 1]}`;
  } else if (STATE.dim === 'day') {
    labelA = STATE.dateA;
    labelB = STATE.compare === 'yoy' ? prevYearDate(STATE.dateA) : STATE.dateB;
  } else {
    labelA = `${STATE.yearOnly}年`; labelB = `${STATE.yearPrev}年`;
  }

  document.getElementById('sc-label-a').textContent = labelA + ' 纯收金额';
  document.getElementById('sc-val-a').textContent = fmt(revA);
  document.getElementById('sc-sub-a').textContent = '收银系统实时数据 · 单位：元';

  document.getElementById('sc-label-b').textContent = labelB + ' 纯收金额';
  document.getElementById('sc-val-b').textContent = fmt(revB);
  const compType = STATE.dim === 'day' ? '同比' : (STATE.compare === 'yoy' ? '同比' : '环比');
  document.getElementById('sc-sub-b').textContent = compType;

  const diffEl = document.getElementById('sc-diff');
  const pctEl = document.getElementById('sc-pct');
  diffEl.textContent = ch.diff !== null ? (ch.diff >= 0 ? '+' : '') + fmt(ch.diff) : '—';
  diffEl.className = 'val ' + (ch.diff !== null ? (ch.diff >= 0 ? 'up' : 'down') : '');
  pctEl.textContent = ch.pct !== null ? (ch.pct >= 0 ? '+' : '') + ch.pct.toFixed(1) + '%' : '—';
  pctEl.className = 'val ' + (ch.pct !== null ? (ch.pct >= 0 ? 'up' : 'down') : '');

  document.getElementById('sc-pct-sub').textContent = compType + (ch.diff !== null ? (ch.diff >= 0 ? ' 增加' : ' 减少') : '');
}

// ════════ 渲染图表 ════════
function renderCharts() {
  if (chartBar) { chartBar.destroy(); chartBar = null; }
  if (chartLine) { chartLine.destroy(); chartLine = null; }

  let labelA = '', labelB = '';
  if (STATE.dim === 'month') {
    labelA = `${STATE.yearA}年${MONTH_NAMES[STATE.monthA - 1]}`;
    labelB = `${STATE.yearB}年${MONTH_NAMES[STATE.monthB - 1]}`;
  } else if (STATE.dim === 'day') {
    labelA = STATE.dateA;
    labelB = STATE.compare === 'yoy' ? prevYearDate(STATE.dateA) : STATE.dateB;
  } else {
    labelA = `${STATE.yearOnly}年`; labelB = `${STATE.yearPrev}年`;
  }

  const revA = getSummaryRevenue(true);
  const revB = getSummaryRevenue(false);
  const monthlyKeys = Object.keys(DATA?.monthlyData || {});
  
  // 调试：更新页面上已有的调试面板
  const debugData = document.getElementById('debug-data');
  if (debugData) {
    debugData.innerHTML += `
      <br/><b style="color:#f0f">📊 图表数据：</b><br/>
      <b>当期(revA)：</b>${revA.toFixed(2)}<br/>
      <b>对比期(revB)：</b>${revB.toFixed(2)}<br/>
      <b>月数据键数量：</b>${monthlyKeys.length}<br/>
    `;
  }

  // 柱状图：当期 vs 对比期
  const ctxBar = document.getElementById('chartBar').getContext('2d');
  chartBar = new Chart(ctxBar, {
    type: 'bar',
    data: {
      labels: [labelA, labelB],
      datasets: [{
        label: '纯收金额（元）',
        data: [revA || 0, revB || 0],
        backgroundColor: [revA >= revB ? 'rgba(192,57,43,0.85)' : 'rgba(39,174,96,0.85)', 'rgba(100,100,130,0.5)'],
        borderColor: [revA >= revB ? '#c0392b' : '#27ae60', '#646482'],
        borderWidth: 1, borderRadius: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(2)} 元` } } },
      scales: { y: { beginAtZero: true, title: { display: true, text: '元' }, grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } }
    }
  });

  // 折线图：近12个月走势
  const entries = Object.entries(DATA?.monthlyData || {}).sort((a, b) => a[0].localeCompare(b[0])).slice(-12);
  const labels12 = entries.map(([k]) => { const [y, m] = k.split('-'); return `${y}年${m}月`; });
  const values12 = entries.map(([, v]) => v || 0);

  const ctxLine = document.getElementById('chartLine').getContext('2d');
  chartLine = new Chart(ctxLine, {
    type: 'line',
    data: {
      labels: labels12,
      datasets: [{
        label: '月纯收金额（元）',
        data: values12,
        borderColor: '#c0392b', backgroundColor: 'rgba(192,57,43,0.1)',
        borderWidth: 2, fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#c0392b'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(2)} 元` } } },
      scales: { y: { beginAtZero: true, title: { display: true, text: '元' }, grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } }
    }
  });
}

// ════════ 渲染表格 ════════
function renderTable(shops) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  let labelA = '', labelB = '';
  if (STATE.dim === 'month') {
    labelA = `${STATE.yearA}年${MONTH_NAMES[STATE.monthA - 1]}`;
    labelB = `${STATE.yearB}年${MONTH_NAMES[STATE.monthB - 1]}`;
  } else if (STATE.dim === 'day') {
    labelA = STATE.dateA;
    labelB = STATE.compare === 'yoy' ? prevYearDate(STATE.dateA) : STATE.dateB;
  } else {
    labelA = `${STATE.yearOnly}年`; labelB = `${STATE.yearPrev}年`;
  }
  document.getElementById('th-a').textContent = labelA;
  document.getElementById('th-b').textContent = labelB;

  if (shops.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">📊</div><p>当前条件下无数据</p><p style="font-size:12px">请确认收银系统已上线并有营业数据</p></div></td></tr>';
    return;
  }

  // 如果选择了单门店，显示单门店数据
  if (STATE.shop && shops.length === 1) {
    const shop = shops[0];
    const revA = getSummaryRevenue(true, shop.centerId);
    const revB = getSummaryRevenue(false, shop.centerId);
    const ch = calcChange(revA, revB);
    const grandtot = document.createElement('tr');
    grandtot.className = 'grandtot';
    grandtot.innerHTML = `
      <td class="c-name">🏪 ${shop.name}</td>
      <td class="c-num">${fmt(revA)}</td>
      <td class="c-num">${fmt(revB)}</td>
      <td class="c-num ${clsUp(ch.diff)}">${ch.diff !== null ? sign(ch.diff) + Math.abs(ch.diff).toFixed(2) : '<span class="c-na">—</span>'}</td>
      <td class="c-pct ${clsUp(ch.pct)}">${ch.pct !== null ? sign(ch.pct) + Math.abs(ch.pct).toFixed(1) + '%' : '<span class="c-na">—</span>'}</td>`;
    tbody.appendChild(grandtot);
    return;
  }

  // 显示各区域和门店明细
  let grandTotalA = 0, grandTotalB = 0;
  const groupedByRegion = {};

  // 按区域分组
  shops.forEach(shop => {
    const region = shop.region || '其他';
    if (!groupedByRegion[region]) groupedByRegion[region] = [];
    groupedByRegion[region].push(shop);
  });

  // 按区域顺序渲染
  const regionOrder = ['北京', '华北', '合肥', '皖北', '浙沪', '黄山', '华南'];
  const sortedRegions = Object.keys(groupedByRegion).sort((a, b) => {
    const ai = regionOrder.indexOf(a), bi = regionOrder.indexOf(b);
    return (ai === -1 ? 9 : ai) - (bi === -1 ? 9 : bi);
  });

  sortedRegions.forEach(region => {
    const regionShops = groupedByRegion[region];
    let regionTotalA = 0, regionTotalB = 0;

    // 区域小计行
    const regionRow = document.createElement('tr');
    regionRow.className = 'subtot';
    regionRow.innerHTML = `<td class="c-name">📍 ${region}区域</td><td colspan="4" style="text-align:right;padding-right:12px;font-size:11px">共 ${regionShops.length} 家门店</td>`;
    tbody.appendChild(regionRow);

    // 各门店行
    regionShops.forEach(shop => {
      const revA = getSummaryRevenue(true, shop.centerId);
      const revB = getSummaryRevenue(false, shop.centerId);
      const ch = calcChange(revA, revB);
      regionTotalA += revA;
      regionTotalB += revB;
      grandTotalA += revA;
      grandTotalB += revB;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="c-name" style="padding-left:24px">${shop.name}</td>
        <td class="c-num">${fmt(revA)}</td>
        <td class="c-num">${fmt(revB)}</td>
        <td class="c-num ${clsUp(ch.diff)}">${ch.diff !== null ? sign(ch.diff) + Math.abs(ch.diff).toFixed(2) : '<span class="c-na">—</span>'}</td>
        <td class="c-pct ${clsUp(ch.pct)}">${ch.pct !== null ? sign(ch.pct) + Math.abs(ch.pct).toFixed(1) + '%' : '<span class="c-na">—</span>'}</td>`;
      tbody.appendChild(tr);
    });

    // 区域汇总行
    const regionCh = calcChange(regionTotalA, regionTotalB);
    const regionTotalRow = document.createElement('tr');
    regionTotalRow.className = 'subtot';
    regionTotalRow.innerHTML = `
      <td class="c-name" style="padding-left:12px">${region}区域汇总</td>
      <td class="c-num">${fmt(regionTotalA)}</td>
      <td class="c-num">${fmt(regionTotalB)}</td>
      <td class="c-num ${clsUp(regionCh.diff)}">${regionCh.diff !== null ? sign(regionCh.diff) + Math.abs(regionCh.diff).toFixed(2) : '<span class="c-na">—</span>'}</td>
      <td class="c-pct ${clsUp(regionCh.pct)}">${regionCh.pct !== null ? sign(regionCh.pct) + Math.abs(regionCh.pct).toFixed(1) + '%' : '<span class="c-na">—</span>'}</td>`;
    tbody.appendChild(regionTotalRow);
  });

  // 总部汇总行
  const grandCh = calcChange(grandTotalA, grandTotalB);
  const grandtot = document.createElement('tr');
  grandtot.className = 'grandtot';
  grandtot.innerHTML = `
    <td class="c-name">🏢 总部汇总</td>
    <td class="c-num">${fmt(grandTotalA)}</td>
    <td class="c-num">${fmt(grandTotalB)}</td>
    <td class="c-num ${clsUp(grandCh.diff)}">${grandCh.diff !== null ? sign(grandCh.diff) + Math.abs(grandCh.diff).toFixed(2) : '<span class="c-na">—</span>'}</td>
    <td class="c-pct ${clsUp(grandCh.pct)}">${grandCh.pct !== null ? sign(grandCh.pct) + Math.abs(grandCh.pct).toFixed(1) + '%' : '<span class="c-na">—</span>'}</td>`;
  tbody.appendChild(grandtot);
}

// ════════ 主渲染 ════════
async function render() {
  if (!DATA) return;

  // 调试：显示 DATA 关键信息
  const debugPanel = document.getElementById('debug-panel');
  const debugData = document.getElementById('debug-data');
  const shopKeys = DATA.shopDailyData ? Object.keys(DATA.shopDailyData) : [];
  const centerIds = ALL_SHOPS.map(s => s.centerId);
  const matchCount = shopKeys.filter(k => centerIds.includes(k)).length;
  
  debugPanel.style.display = 'block';
  debugData.innerHTML = `
    <b style="color:#ff0">🔍 数据诊断：</b><br/>
    <b>shopDailyData 键数量：</b>${shopKeys.length}<br/>
    <b>ALL_SHOPS centerId 数量：</b>${centerIds.length}<br/>
    <b>匹配的键数量：</b>${matchCount}<br/>
    <b>shopDailyData 键：</b>${shopKeys.slice(0, 5).join(', ')}${shopKeys.length > 5 ? '...' : ''}<br/>
    <b>centerId 示例：</b>${centerIds.slice(0, 5).join(', ')}<br/>
    <b>STATE.dim：</b>${STATE.dim} | <b>STATE.dateA：</b>${STATE.dateA}<br/>
  `;

  const title = STATE.shop ? STATE.shop : (STATE.region ? STATE.region + '区域' : '全部门店');
  document.getElementById('table-title').textContent = title + ' 经营数据';

  let shops = ALL_SHOPS.filter(s => {
    if (STATE.region && s.region !== STATE.region) return false;
    if (STATE.shop && s.name !== STATE.shop) return false;
    return true;
  });
  
  // 应用排序
  if (SORT.field && shops.length > 1) {
    shops.sort((a, b) => {
      let valA, valB;
      const revA_a = getSummaryRevenue(true, a.centerId);
      const revA_b = getSummaryRevenue(true, b.centerId);
      const revB_a = getSummaryRevenue(false, a.centerId);
      const revB_b = getSummaryRevenue(false, b.centerId);
      const ch_a = calcChange(revA_a, revB_a);
      const ch_b = calcChange(revA_b, revB_b);
      
      switch (SORT.field) {
        case 'name': valA = a.name; valB = b.name; break;
        case 'revA': valA = revA_a; valB = revA_b; break;
        case 'revB': valA = revB_a; valB = revB_b; break;
        case 'diff': valA = ch_a.diff ?? 0; valB = ch_b.diff ?? 0; break;
        case 'pct': valA = ch_a.pct ?? 0; valB = ch_b.pct ?? 0; break;
        default: return 0;
      }
      
      if (typeof valA === 'string') {
        return SORT.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
      }
      return SORT.asc ? valA - valB : valB - valA;
    });
  }
  
  document.getElementById('table-meta').textContent = `共 ${shops.length} 家门店`;

  renderSummary();
  renderTable(shops);
  renderCharts();
}

function exportData() {
  if (!DATA) {
    alert('暂无数据可导出');
    return;
  }
  
  const title = STATE.shop ? STATE.shop : (STATE.region ? STATE.region + '区域' : '全部门店');
  let labelA = '', labelB = '', compareLabel = '';
  if (STATE.dim === 'month') {
    labelA = `${STATE.yearA}年${MONTH_NAMES[STATE.monthA - 1]}`;
    labelB = `${STATE.yearB}年${MONTH_NAMES[STATE.monthB - 1]}`;
    compareLabel = STATE.compare === 'yoy' ? '同比' : '环比';
  } else if (STATE.dim === 'day') {
    labelA = STATE.dateA;
    labelB = STATE.compare === 'yoy' ? prevYearDate(STATE.dateA) : STATE.dateB;
    compareLabel = '同比';
  } else {
    labelA = `${STATE.yearOnly}年`; labelB = `${STATE.yearPrev}年`; compareLabel = '同比';
  }
  
  let csv = '\uFEFF';
  csv += `徽商故里经营数据报表\n`;
  csv += `对比维度: ${compareLabel}\n`;
  csv += `数据范围: ${title}\n`;
  csv += `单位: 元\n`;
  csv += `生成时间: ${new Date().toLocaleString('zh-CN')}\n\n`;
  
  // 表格数据：区域 + 门店 + 当期 + 对比期 + 增减额 + 增减幅
  csv += `区域,门店,${labelA}纯收金额,${labelB}纯收金额,增减额,增减幅\n`;
  
  // 获取当前筛选的门店列表
  let shops = ALL_SHOPS.filter(s => {
    if (STATE.region && s.region !== STATE.region) return false;
    if (STATE.shop && s.name !== STATE.shop) return false;
    return true;
  });
  
  // 按区域分组
  const groupedByRegion = {};
  shops.forEach(shop => {
    const region = shop.region || '其他';
    if (!groupedByRegion[region]) groupedByRegion[region] = [];
    groupedByRegion[region].push(shop);
  });
  
  const regionOrder = ['北京', '华北', '合肥', '皖北', '浙沪', '黄山', '华南'];
  const sortedRegions = Object.keys(groupedByRegion).sort((a, b) => {
    const ai = regionOrder.indexOf(a), bi = regionOrder.indexOf(b);
    return (ai === -1 ? 9 : ai) - (bi === -1 ? 9 : bi);
  });
  
  let grandTotalA = 0, grandTotalB = 0;
  
  sortedRegions.forEach(region => {
    const regionShops = groupedByRegion[region];
    let regionTotalA = 0, regionTotalB = 0;
    
    regionShops.forEach(shop => {
      const revA = getSummaryRevenue(true, shop.centerId);
      const revB = getSummaryRevenue(false, shop.centerId);
      const ch = calcChange(revA, revB);
      regionTotalA += revA;
      regionTotalB += revB;
      grandTotalA += revA;
      grandTotalB += revB;
      
      csv += `${region},${shop.name},${revA.toFixed(2)},${revB.toFixed(2)},`;
      csv += ch.diff !== null ? `${ch.diff >= 0 ? '+' : ''}${ch.diff.toFixed(2)},` : ',';
      csv += ch.pct !== null ? `${ch.pct >= 0 ? '+' : ''}${ch.pct.toFixed(1)}%` : '';
      csv += '\n';
    });
    
    // 区域汇总行
    const regionCh = calcChange(regionTotalA, regionTotalB);
    csv += `${region}区域汇总,,,,,\n`;
    csv += `,本区域小计,${regionTotalA.toFixed(2)},${regionTotalB.toFixed(2)},`;
    csv += regionCh.diff !== null ? `${regionCh.diff >= 0 ? '+' : ''}${regionCh.diff.toFixed(2)},` : ',';
    csv += regionCh.pct !== null ? `${regionCh.pct >= 0 ? '+' : ''}${regionCh.pct.toFixed(1)}%` : '';
    csv += '\n';
  });
  
  // 总部汇总行
  const grandCh = calcChange(grandTotalA, grandTotalB);
  csv += `总部汇总,,,,,\n`;
  csv += `,全部门店合计,${grandTotalA.toFixed(2)},${grandTotalB.toFixed(2)},`;
  csv += grandCh.diff !== null ? `${grandCh.diff >= 0 ? '+' : ''}${grandCh.diff.toFixed(2)},` : ',';
  csv += grandCh.pct !== null ? `${grandCh.pct >= 0 ? '+' : ''}${grandCh.pct.toFixed(1)}%` : '';
  csv += '\n';
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const timeStr = new Date().toISOString().slice(0, 10);
  a.download = `徽商故里_${title}_${timeStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// 诊断工具：对比朝阳门店2月1日API数据与文档数据
// 文档正确值：纯收=56714.13，营业收入=59460.00，非收入=2745.87
window.debugCompare = async function(date = '2026-02-01', shopId = '247413') {
  const token = localStorage.getItem('wdtoken') || '';
  const baseUrl = 'https://boss.huiShang56.com';
  const dateType = 1;
  const pageSize = 500;
  let pageNo = 1;
  let allBills = [];
  
  while (true) {
    const qs = `centerId=247412&shopId=${shopId}&settleDate=${date}&dateType=${dateType}&pageNo=${pageNo}&pageSize=${pageSize}`;
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    try {
      const res = await fetch(`${baseUrl}/datatransfer/getserialdata?${qs}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'access_token': token, 'accessid': 'huiShang', 'granttype': 'client' }
      });
      clearTimeout(timeoutId);
      const json = await res.json();
      const bills = json?.data?.billList || [];
      if (bills.length === 0) break;
      allBills = allBills.concat(bills);
      const totalPages = json?.data?.pageInfo?.pageTotal || 1;
      if (pageNo >= totalPages) break;
      pageNo++;
    } catch (e) {
      clearTimeout(timeoutId);
      console.error('API错误:', e);
      break;
    }
  }
  
  // 计算汇总
  let sumLastTotal = 0, sumNotIncome = 0, sumItemIncome = 0;
  let billCount = 0, itemCount = 0;
  const paymentBreakdown = {};
  
  for (const b of allBills) {
    const lt = parseFloat(b.last_total) || 0;
    const ni = parseFloat(b.not_income_money) || 0;
    const ii = parseFloat(b.item_income_total) || 0;
    const payType = b.pay_type || b.payWay || '未知';
    sumLastTotal += lt;
    sumNotIncome += ni;
    sumItemIncome += ii;
    billCount++;
    itemCount += 1;
    if (!paymentBreakdown[payType]) paymentBreakdown[payType] = 0;
    paymentBreakdown[payType] += lt - ni;
  }
  
  const apiPure = sumLastTotal - sumNotIncome;
  const docPure = 56714.13; // 文档正确值
  
  console.log(`\n========== 诊断对比: ${date} 朝阳门店 ==========`);
  console.log(`API账单数: ${billCount}, 明细行数: ${itemCount}`);
  console.log(`sum(last_total):        ${sumLastTotal.toFixed(2)}`);
  console.log(`sum(not_income_money):  ${sumNotIncome.toFixed(2)}`);
  console.log(`API纯收(lt-ni):         ${apiPure.toFixed(2)}`);
  console.log(`API sum(item_income):   ${sumItemIncome.toFixed(2)}`);
  console.log(`文档纯收:              ${docPure.toFixed(2)}`);
  console.log(`差异(文档-API):         ${(docPure - apiPure).toFixed(2)}`);
  console.log(`\n支付方式分解:`, paymentBreakdown);
  
  // 打印前3条明细
  console.log(`\n前3条明细:`);
  allBills.slice(0, 3).forEach((b, i) => {
    console.log(`  [${i+1}] last_total=${b.last_total} | not_income=${b.not_income_money} | item_income=${b.item_income_total} | pay=${b.pay_type || b.payWay}`);
  });
  
  return { sumLastTotal, sumNotIncome, apiPure, docPure, diff: docPure - apiPure };
};

  try {
    DATA = await loadAllData();
    document.getElementById('loading-mask').style.display = 'none';
    initSelectors();

    console.error('加载失败:', err);

    // 更健壮的错误信息提取
    let errMsg = '请检查网络连接后刷新重试';
    if (err) {
      if (typeof err === 'string') errMsg = err;
      else if (err.message) errMsg = err.message;
      else if (err.name === 'AbortError') errMsg = '请求超时，请检查网络连接后刷新';
      else if (err.type) errMsg = err.type; // 可能包含 'cors', 'network' 等
    }
    document.getElementById('loading-status').textContent = errMsg;
    document.getElementById('loading-progress-bar').style.background = '#e74c3c';
  }
});
